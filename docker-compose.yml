---
services:
  freqtrade:
    build:
      context: .
      dockerfile: "./docker/Dockerfile.custom"
    restart: unless-stopped
    container_name: freqtrade
    volumes:
      - "./user_data:/freqtrade/user_data"
      - "./trade_overseer:/freqtrade/trade_overseer"
    env_file:
      - .env
    ports:
      - "0.0.0.0:8080:8080"
    depends_on:
      - notification-handler
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade.log
      --db-url sqlite:////freqtrade/user_data/tradesv3.sqlite
      --config /freqtrade/user_data/config.json
      --strategy SygnifStrategy

  freqtrade-futures:
    build:
      context: .
      dockerfile: "./docker/Dockerfile.custom"
    restart: unless-stopped
    container_name: freqtrade-futures
    volumes:
      - "./user_data:/freqtrade/user_data"
      - "./trade_overseer:/freqtrade/trade_overseer"
    env_file:
      - .env
    ports:
      - "0.0.0.0:8081:8081"
    depends_on:
      - notification-handler
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade-futures.log
      --db-url sqlite:////freqtrade/user_data/tradesv3-futures.sqlite
      --config /freqtrade/user_data/config_futures.json
      --strategy MarketStrategy2

  notification-handler:
    build:
      context: .
      dockerfile: "./docker/Dockerfile.notifications"
    restart: unless-stopped
    container_name: notification-handler
    env_file:
      - .env
    ports:
      - "127.0.0.1:8089:8089"
    command: python3 /app/notification_handler.py --port 8089

  # Trade overseer: same Docker network as Freqtrade APIs (not 127.0.0.1 from host).
  # NPU/OpenVINO: run overseer on host if needed; this image is requests-only.
  trade-overseer:
    build:
      context: .
      dockerfile: "./trade_overseer/Dockerfile"
    restart: unless-stopped
    container_name: trade-overseer
    env_file:
      - .env
    environment:
      FT_SPOT_URL: "http://freqtrade:8080/api/v1"
      FT_FUTURES_URL: "http://freqtrade-futures:8081/api/v1"
      OVERSEER_HTTP_HOST: "0.0.0.0"
      # Finance agent on host (Docker Desktop). Linux: set in .env or use extra_hosts.
      FINANCE_AGENT_BRIEFING_URL: "http://host.docker.internal:8091/briefing"
      OVERSEER_AGENT_URL: "http://host.docker.internal:8091/overseer/commentary"
    ports:
      - "127.0.0.1:8090:8090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - freqtrade
      - freqtrade-futures
    volumes:
      - "./trade_overseer/data:/app/trade_overseer/data"
