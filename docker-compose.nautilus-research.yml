# -----------------------------------------------------------------------------
# Nautilus research stack — merge with base compose so `finance-agent` resolves.
#
#   export COMPOSE_FILE=docker-compose.yml:docker-compose.nautilus-research.yml
#   docker compose up -d nautilus-research
#
# Requires existing bridge `sygnif_backend` (from a prior `docker compose up`).
#
# BTC spot Freqtrade + Nautilus: use **`docker-compose.yml`** profile **`btc-nautilus`**
# (see `letscrash/BTC_TRADER_DOCKER.md` §3b) instead of this file alone if you want both services.
# -----------------------------------------------------------------------------

networks:
  sygnif_backend:
    external: true
    name: ${SYGNIF_DOCKER_NETWORK_NAME:-sygnif_backend}

services:
  nautilus-research:
    build:
      context: .
      dockerfile: docker/Dockerfile.nautilus_research
    container_name: nautilus-research
    restart: unless-stopped
    networks:
      - sygnif_backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "./finance_agent:/lab/finance_agent:ro"
      - "./finance_agent/btc_specialist/data:/lab/btc_specialist_data:rw"
      - "./research/nautilus_lab:/lab/workspace:rw"
      - "./user_data:/lab/user_data:ro"
      - "./prediction_agent:/lab/prediction_agent:ro"
    env_file:
      - ${SYGNIF_SECRETS_ENV_FILE:-/home/ubuntu/xrp_claude_bot/.env}
      - .env
    environment:
      # Same network DNS as freqtrade — finance-agent briefing + sentiment
      FINANCE_AGENT_BASE_URL: ${NAUTILUS_FINANCE_AGENT_URL:-http://finance-agent:8091}
      # Align with spot dry_run_wallet default in user_data/config.json (paper sizing)
      SYGNIF_SPOT_NOTIONAL_USDT: "${SYGNIF_SPOT_NOTIONAL_USDT:-100}"
      NAUTILUS_BTC_OHLCV_DIR: "/lab/btc_specialist_data"
      NAUTILUS_BYBIT_POLL_SEC: "${NAUTILUS_BYBIT_POLL_SEC:-300}"
      NAUTILUS_BTC_BAR_LIMIT: "${NAUTILUS_BTC_BAR_LIMIT:-900}"
      NAUTILUS_BYBIT_DEMO: "${NAUTILUS_BYBIT_DEMO:-false}"
      NAUTILUS_BYBIT_TESTNET: "${NAUTILUS_BYBIT_TESTNET:-false}"
    # Default: idle. For Nautilus→Bybit inflow: `command: ["/bin/sh", "/lab/workspace/run_bybit_sink_loop.sh"]`
    # or use `docker-compose.yml` profile `btc-nautilus` (`run_nautilus_bundled.sh`).
    command: ["sleep", "infinity"]
