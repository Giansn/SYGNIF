# -----------------------------------------------------------------------------
# Optional **strategy sidecar** — same image as ``nautilus-research``, different process.
# **Prefer:** ``docker-compose.yml`` profile ``btc-nautilus`` + ``run_nautilus_bundled.sh`` (sink + sidecar in ``nautilus-research``).
#
# Reads ``btc_1h_ohlcv.json`` (written by the sink) → ``nautilus_strategy_signal.json``.
# No second Bybit poll; pair with ``docker-compose.btc-nautilus-research.yml`` (sink) or any
# stack that already populates ``finance_agent/btc_specialist/data/``.
#
#   docker compose -f docker-compose.yml -f docker-compose.nautilus-strategy-sidecar.yml --profile btc-nautilus up -d nautilus-strategy
#
# Or sink elsewhere + sidecar only (ensure shared volume has fresh OHLCV):
#   export COMPOSE_FILE=docker-compose.yml:docker-compose.nautilus-strategy-sidecar.yml
# -----------------------------------------------------------------------------

networks:
  sygnif_backend:
    external: true
    name: ${SYGNIF_DOCKER_NETWORK_NAME:-sygnif_backend}

services:
  nautilus-strategy:
    build:
      context: .
      dockerfile: docker/Dockerfile.nautilus_research
    image: sygnif-nautilus-research:latest
    container_name: nautilus-strategy
    restart: unless-stopped
    networks:
      - sygnif_backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - "./finance_agent:/lab/finance_agent:ro"
      - "./finance_agent/btc_specialist/data:/lab/btc_specialist_data:rw"
      - "./research/nautilus_lab:/lab/workspace:rw"
      - "./user_data:/lab/user_data:ro"
      - "./prediction_agent:/lab/prediction_agent:ro"
    env_file:
      - ${SYGNIF_SECRETS_ENV_FILE:-/home/ubuntu/xrp_claude_bot/.env}
      - .env
    environment:
      FINANCE_AGENT_BASE_URL: ${NAUTILUS_FINANCE_AGENT_URL:-http://finance-agent:8091}
      NAUTILUS_BTC_OHLCV_DIR: "/lab/btc_specialist_data"
      NAUTILUS_STRATEGY_POLL_SEC: "${NAUTILUS_STRATEGY_POLL_SEC:-300}"
    command: ["python3", "/lab/workspace/nautilus_sidecar_strategy.py", "--loop"]
